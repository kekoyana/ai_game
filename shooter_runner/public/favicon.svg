<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Magic circle -->
  <circle cx="32" cy="32" r="30" fill="#0a0a1a" stroke="#6688cc" stroke-width="2" opacity="0.8"/>
  <circle cx="32" cy="32" r="22" fill="none" stroke="#4466aa" stroke-width="1" opacity="0.5"/>
  <!-- Wizard hat -->
  <polygon points="32,6 44,30 20,30" fill="#1a2266"/>
  <ellipse cx="32" cy="30" rx="15" ry="4" fill="#2244aa"/>
  <!-- Star on hat -->
  <text x="32" y="24" text-anchor="middle" font-size="10" fill="#ffdd44" font-family="serif">&#x2605;</text>
  <!-- Staff -->
  <line x1="42" y1="52" x2="40" y2="22" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>
  <!-- Crystal on staff -->
  <circle cx="40" cy="20" r="4" fill="#44ddff"/>
  <circle cx="40" cy="20" r="6" fill="#44ddff" opacity="0.3"/>
  <!-- Robe body -->
  <path d="M32,30 Q40,38 38,54 L26,54 Q24,38 32,30Z" fill="#1a2e7a"/>
</svg>
